<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(function(){try{var t=localStorage.getItem('theme');if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="./theme.css">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="fonts/fonts.css" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box} body{margin:0}
@media (max-width:767px){footer nav a{min-height:44px;display:inline-flex;align-items:center}}</style>
</helmet>
<footer style="border-top:1px solid var(--border);background:var(--surface);font-family:Inter,system-ui,sans-serif">
  <div style="max-width:1140px;margin:0 auto;padding:32px 20px;display:flex;align-items:center;gap:16px 28px;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;gap:6px;min-width:220px">
      <span style="font:600 16px Sora,sans-serif;color:var(--text)">© 2026 {{ brandName }}</span>
      <span style="font:400 13.5px/1.5 Inter,system-ui,sans-serif;color:var(--text-meta)">Боты, приложения, веб-сервисы и автоматизация для бизнеса</span>
    </div>
    <nav aria-label="Разделы сайта" style="display:flex;gap:4px 6px;margin-left:auto;flex-wrap:wrap">
      <a href="projects.html" style="padding:8px 12px;border-radius:10px;text-decoration:none;font:500 14.5px Inter,system-ui,sans-serif;color:var(--text)" style-hover="background:var(--accent-tint);color:var(--accent)" style-focus-visible="outline:2px solid var(--accent);outline-offset:2px">Проекты</a>
      <a href="services.html" style="padding:8px 12px;border-radius:10px;text-decoration:none;font:500 14.5px Inter,system-ui,sans-serif;color:var(--text)" style-hover="background:var(--accent-tint);color:var(--accent)" style-focus-visible="outline:2px solid var(--accent);outline-offset:2px">Услуги</a>
      <a href="about.html" style="padding:8px 12px;border-radius:10px;text-decoration:none;font:500 14.5px Inter,system-ui,sans-serif;color:var(--text)" style-hover="background:var(--accent-tint);color:var(--accent)" style-focus-visible="outline:2px solid var(--accent);outline-offset:2px">О нас</a>
      <a href="partner.html" style="padding:8px 12px;border-radius:10px;text-decoration:none;font:500 14.5px Inter,system-ui,sans-serif;color:var(--text)" style-hover="background:var(--accent-tint);color:var(--accent)" style-focus-visible="outline:2px solid var(--accent);outline-offset:2px">Партнёрам</a>
      <a href="contact.html" style="padding:8px 12px;border-radius:10px;text-decoration:none;font:500 14.5px Inter,system-ui,sans-serif;color:var(--accent)" style-hover="background:var(--accent-tint)" style-focus-visible="outline:2px solid var(--accent);outline-offset:2px">Написать</a>
    </nav>
  </div>
  <div style="max-width:1140px;margin:0 auto;padding:0 20px 24px;display:flex;align-items:center;gap:8px 24px;flex-wrap:wrap;border-top:0">
    <span style="font:400 12.5px/1.5 Inter,system-ui,sans-serif;color:var(--text-muted)">{{ requisitesFull }} · {{ requisites }}</span>
    <nav aria-label="Правовая информация" style="display:flex;gap:2px 14px;margin-left:auto;flex-wrap:wrap">
      <a href="privacy.html" style="font:400 12.5px/1.5 Inter,system-ui,sans-serif;color:var(--text-muted);text-decoration:none;border-radius:4px" style-hover="color:var(--accent);text-decoration:underline" style-focus-visible="outline:2px solid var(--accent);outline-offset:1px">Политика конфиденциальности</a>
      <a href="consent.html" style="font:400 12.5px/1.5 Inter,system-ui,sans-serif;color:var(--text-muted);text-decoration:none;border-radius:4px" style-hover="color:var(--accent);text-decoration:underline" style-focus-visible="outline:2px solid var(--accent);outline-offset:1px">Согласие на обработку ПДн</a>
    </nav>
  </div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;1200px&quot;,&quot;height&quot;:&quot;120px&quot;},&quot;brandName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Re:dnd&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const cfg = (typeof window !== 'undefined' && window.SITE_CONFIG) || {};
    return {
      brandName: this.props.brandName ?? 'Re:dnd',
      requisitesFull: cfg.requisitesFull || 'ИП Яценко Даниил [ОТЧЕСТВО]',
      requisites: cfg.requisites || 'ИНН 502991709786 · ОГРНИП 325774600194672',
    };
  }
}
</script>
</body>
</html>
