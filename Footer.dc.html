<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Sora:wght@600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box} body{margin:0}</style>
</helmet>
<footer style="border-top:1px solid #D9E3EB;background:#FFFFFF;font-family:Inter,system-ui,sans-serif">
  <div style="max-width:1140px;margin:0 auto;padding:32px 20px;display:flex;align-items:center;gap:16px 28px;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;gap:6px;min-width:220px">
      <span style="font:600 16px Sora,sans-serif;color:#13232F">© 2026 {{ brandName }}</span>
      <span style="font:400 13.5px/1.5 Inter,system-ui,sans-serif;color:#5A7284">Telegram-боты, мини-аппы и автоматизация для бизнеса</span>
    </div>
    <nav aria-label="Разделы сайта" style="display:flex;gap:4px 6px;margin-left:auto;flex-wrap:wrap">
      <a href="Projects.dc.html" style="padding:8px 12px;border-radius:10px;text-decoration:none;font:500 14.5px Inter,system-ui,sans-serif;color:#13232F" style-hover="background:#EAF4FB;color:#1A79C7" style-focus="outline:2px solid #1A79C7;outline-offset:2px">Проекты</a>
      <a href="Services.dc.html" style="padding:8px 12px;border-radius:10px;text-decoration:none;font:500 14.5px Inter,system-ui,sans-serif;color:#13232F" style-hover="background:#EAF4FB;color:#1A79C7" style-focus="outline:2px solid #1A79C7;outline-offset:2px">Услуги</a>
      <a href="About.dc.html" style="padding:8px 12px;border-radius:10px;text-decoration:none;font:500 14.5px Inter,system-ui,sans-serif;color:#13232F" style-hover="background:#EAF4FB;color:#1A79C7" style-focus="outline:2px solid #1A79C7;outline-offset:2px">Обо мне</a>
      <a href="Contact.dc.html" style="padding:8px 12px;border-radius:10px;text-decoration:none;font:500 14.5px Inter,system-ui,sans-serif;color:#1A79C7" style-hover="background:#EAF4FB" style-focus="outline:2px solid #1A79C7;outline-offset:2px">Написать</a>
    </nav>
  </div>
</footer>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;1200px&quot;,&quot;height&quot;:&quot;120px&quot;},&quot;brandName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Даниил Яценко&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { brandName: this.props.brandName ?? 'Даниил Яценко' };
  }
}
</script>
</body>
</html>
