# DEPRECATED (2026-07-04): форма переехала на Vercel (api/form.js).
# Причина: IP VPS совпадает с VPN-сервером — у клиентов под VPN
# запросы к form.rednd.ru таймаутились. Сервис на VPS оставлен
# работающим, но фронт его больше не использует.
# /etc/nginx/sites-available/form.rednd.ru.conf
# Эндпоинт формы rednd.ru -> локальный python-сервис на 8011
# (8010 на сервере занят чужим uvicorn).
# После установки certbot --nginx -d form.rednd.ru добавит сюда 443/ssl.
server {
    listen 80;
    server_name form.rednd.ru;

    # тело заявки маленькое — режем всё лишнее
    client_max_body_size 64k;

    location / {
        proxy_pass http://127.0.0.1:8011;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
